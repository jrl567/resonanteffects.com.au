<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Resonant Effects</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <main class="main-container">
        
        <div class="logo-section">
            <div class="glow-container">
                <div class="glow-radial"></div>
                <div class="glow-conic" style="transform: translateX(-50%) translateY(-20%);"></div>
            </div>
            <h1 class="page-title">Contact Us</h1>
        </div>

        <div class="contact-wrapper">
            <form action="https://formspree.io/f/meeragwo" method="POST" class="contact-form">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us about your setup..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message <span class="arrow">&rarr;</span></button>
            </form>
            
            <a href="index.html" class="back-link">&larr; Back to Home</a>
        </div>
        
    </main>
</body>
</html>
